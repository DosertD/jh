body{

.contact-section{
    max-width:1000px;
    margin:200px auto;
    padding:0 20px;
    display:flex;
    justify-content:space-between;
}

.contact-left{
    width:40%;
}

.contact-left h2{
    font-size:60px;
    margin-bottom:20px;
}

.contact-left p{
    color:#777;
    line-height:1.6;
}

.contact-right{
    width:45%;
}

.contact-item{
    margin-bottom:30px;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
}

.contact-item span{
    font-size:12px;
    color:#999;
    letter-spacing:2px;
}

.contact-item p{
    font-size:18px;
    margin-top:5px;
}

.contact-item p{
    font-size:18px;
    margin-top:5px;
    transition:0.3s;
    cursor:pointer;
}

.contact-item p:hover{
    color:#cbb89d;
}

.contact-item a{
    text-decoration:none;
    color:inherit;
}
.contact-vertical{
  position:fixed;
  left:30px;
  top:50%;
  transform:translateY(-50%) rotate(180deg);
  writing-mode:vertical-rl;
  font-size:14px;
  letter-spacing:5px;
  color:#cbbba0; /* 베이지 포인트 */
}
.contact-vertical::after{
    content:"";
  position:absolute;
  left:50%;
  top:-150px;
  width:2px;
  height:150px;
  background:linear-gradient(
    to bottom,
    transparent,
    #cbbba0,
    transparent
  );
  transform:translateX(-50%);
}

@media (max-width: 768px) {
